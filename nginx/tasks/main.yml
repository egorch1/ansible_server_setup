---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Create index.html
  copy:
    content: |
      <html>
        <head><title>Ansible Deployed</title></head>
        <body>
          <h1>Success!</h1>
          <p>This server was configured by Ansible.</p>
        </body>
      </html>
    dest: /var/www/html/index.html

- name: Ensure nginx is running
  service:
    name: nginx
    state: started
    enabled: yes
